---
# OpenClaw Backup Restore Playbook
#
# Restores a backup archive to /home/openclaw/.openclaw/
#
# Usage (run on the server as root):
#   ansible-playbook restore_backup.yml -e "backup_path=/tmp/openclaw_backup.tar.gz"
#
# The backup archive must already be present on the server at backup_path.
# Upload it first:
#   scp -i ~/.ssh/id_rsa openclaw_backup.tar.gz root@<server>:/tmp/

- name: Restore OpenClaw backup
  hosts: localhost
  connection: local
  become: false

  vars:
    backup_path: "/tmp/openclaw_backup.tar.gz"
    openclaw_home: "/home/openclaw"
    openclaw_user: "openclaw"
    pre_restore_backup: "/tmp/openclaw_pre_restore_{{ ansible_date_time.epoch }}.tar.gz"

  tasks:
    - name: Verify running as root
      fail:
        msg: "This playbook must be run as root"
      when: ansible_user_id != "root"

    - name: Check backup archive exists
      stat:
        path: "{{ backup_path }}"
      register: backup_stat

    - name: Fail if backup archive not found
      fail:
        msg: "Backup archive not found at {{ backup_path }}. Upload it first with: scp openclaw_backup.tar.gz root@{{ ansible_host }}:/tmp/"
      when: not backup_stat.stat.exists

    - name: Check openclaw user exists
      getent:
        database: passwd
        key: "{{ openclaw_user }}"
      register: openclaw_user_info
      ignore_errors: true

    - name: Fail if openclaw user does not exist
      fail:
        msg: "User '{{ openclaw_user }}' does not exist. Run the installation playbook first: ./run-playbook.sh"
      when: openclaw_user_info is failed

    # openclaw uses a user-level systemd service (systemctl --user -M openclaw@)
    - name: Stop openclaw user service
      command: systemctl --user -M {{ openclaw_user }}@ stop openclaw-gateway.service
      ignore_errors: true
      register: stop_result

    - name: Create pre-restore safety backup (if .openclaw exists)
      archive:
        path: "{{ openclaw_home }}/.openclaw"
        dest: "{{ pre_restore_backup }}"
        format: gz
      ignore_errors: true

    - name: Show pre-restore backup location
      debug:
        msg: "Pre-restore safety backup saved to {{ pre_restore_backup }}"
      ignore_errors: true

    - name: Extract backup archive to openclaw home
      unarchive:
        src: "{{ backup_path }}"
        dest: "{{ openclaw_home }}"
        remote_src: true
        extra_opts:
          - "--no-same-owner"
          - "--overwrite"

    - name: Fix ownership on restored .openclaw directory
      file:
        path: "{{ openclaw_home }}/.openclaw"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        recurse: true

    - name: Replace old home path in all openclaw config files
      shell: |
        find {{ openclaw_home }}/.openclaw -type f \( -name "*.json" -o -name "*.cfg" -o -name "*.yml" \) \
          ! -name "*.bak" \
          -exec grep -lP "/home/(?!openclaw)[^/]+" {} \; | \
          xargs -r sed -i "s|/home/[^/]*/\.openclaw|{{ openclaw_home }}/.openclaw|g; \
                           s|/home/[^/]*/.cache/ms-playwright|{{ openclaw_home }}/.cache/ms-playwright|g"
      changed_when: true

    - name: Enable user lingering (needed for user services to persist without active session)
      command: loginctl enable-linger {{ openclaw_user }}

    - name: Install openclaw daemon (user service) if not already installed
      command: >
        systemd-run --user -M {{ openclaw_user }}@
        /home/{{ openclaw_user }}/.local/share/pnpm/openclaw daemon install
      ignore_errors: true

    - name: Restart openclaw user service
      command: systemctl --user -M {{ openclaw_user }}@ restart openclaw-gateway.service
      ignore_errors: true

    - name: Wait for openclaw to start
      pause:
        seconds: 4

    - name: Check service status
      command: systemctl --user -M {{ openclaw_user }}@ is-active openclaw-gateway.service
      register: service_status
      ignore_errors: true

    - name: Show service status
      debug:
        msg: "OpenClaw service is {{ service_status.stdout | default('unknown') }}"

    - name: Configure exec approvals (no approval required for commands)
      ansible.builtin.shell: |
        python3 - <<'PYEOF'
        import json, os, secrets
        path = "{{ openclaw_home }}/.openclaw/exec-approvals.json"
        if os.path.exists(path):
            with open(path) as f:
                cfg = json.load(f)
        else:
            cfg = {
                "version": 1,
                "socket": {
                    "path": "{{ openclaw_home }}/.openclaw/exec-approvals.sock",
                    "token": secrets.token_urlsafe(32)
                },
                "agents": {}
            }
        cfg["defaults"] = {"security": "full", "ask": "off", "askFallback": "full"}
        for agent in cfg.get("agents", {}).values():
            agent["security"] = "full"
            agent["ask"] = "off"
            agent["askFallback"] = "full"
        with open(path, "w") as f:
            json.dump(cfg, f, indent=2)
        # Also set tools.exec.security=full in openclaw.json if it exists
        oc_path = "{{ openclaw_home }}/.openclaw/openclaw.json"
        if os.path.exists(oc_path):
            with open(oc_path) as f:
                oc = json.load(f)
            oc.setdefault("tools", {}).setdefault("exec", {})["security"] = "full"
            oc["tools"]["exec"]["ask"] = "off"
            # Lock down Telegram group access (DMs-only, allowlist policy)
            tg = oc.get("channels", {}).get("telegram", {})
            if tg:
                tg["groupPolicy"] = "allowlist"
                tg["groups"] = {"-5183070454": {}, "-5085019536": {}, "-542127891": {}}
            # OpenRouter provider (MiniMax M2.5 as default model)
            OR_KEY = "{{ openrouter_api_key }}"
            oc.setdefault("auth", {}).setdefault("profiles", {})["openrouter:manual"] = {
                "provider": "openrouter", "mode": "token"
            }
            oc.setdefault("models", {}).setdefault("providers", {})["openrouter"] = {
                "baseUrl": "https://openrouter.ai/api/v1",
                "apiKey": OR_KEY,
                "api": "openai-responses",
                "models": [{
                    "id": "minimax/minimax-m2.5",
                    "name": "MiniMax M2.5",
                    "api": "openai-responses",
                    "input": ["text"],
                    "contextWindow": 200000,
                    "maxTokens": 40960
                }]
            }
            oc.setdefault("agents", {}).setdefault("defaults", {})["model"] = {
                "primary": "openrouter/minimax/minimax-m2.5",
                "fallbacks": ["openai-codex/gpt-5.3-codex", "anthropic/claude-opus-4-6"]
            }
            with open(oc_path, "w") as f:
                json.dump(oc, f, indent=2)
        PYEOF
      become: false
      changed_when: true

    - name: Patch agent auth with OpenRouter key (if agent dir exists)
      ansible.builtin.shell: |
        python3 - <<'PYEOF'
        import json, os, time
        OR_KEY = "{{ openrouter_api_key }}"
        agent_dir = "{{ openclaw_home }}/.openclaw/agents/main/agent"
        # auth-profiles.json
        ap_path = os.path.join(agent_dir, "auth-profiles.json")
        if os.path.exists(ap_path):
            with open(ap_path) as f:
                ap = json.load(f)
            ap.setdefault("profiles", {})["openrouter:manual"] = {
                "type": "token", "provider": "openrouter", "token": OR_KEY,
                "expires": int(time.time() * 1000) + 365 * 24 * 3600 * 1000
            }
            with open(ap_path, "w") as f:
                json.dump(ap, f, indent=2)
        # auth.json
        a_path = os.path.join(agent_dir, "auth.json")
        if os.path.exists(a_path):
            with open(a_path) as f:
                a = json.load(f)
            a["openrouter"] = {"type": "api_key", "key": OR_KEY}
            with open(a_path, "w") as f:
                json.dump(a, f, indent=2)
        PYEOF
      become: false
      changed_when: true

    - name: Fix .cache directory ownership (needed for Playwright browser install)
      file:
        path: "{{ openclaw_home }}/.cache"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        recurse: true
        state: directory

    - name: Check if Playwright Chromium is installed
      stat:
        path: "{{ openclaw_home }}/.cache/ms-playwright/chromium-1208/chrome-linux64/chrome"
      register: playwright_chrome

    - name: Install Playwright system dependencies (if Chromium not present)
      command: >
        node {{ openclaw_home }}/.local/share/pnpm/global/5/.pnpm/playwright-core@1.58.2/node_modules/playwright-core/cli.js
        install-deps chromium
      when: not playwright_chrome.stat.exists
      ignore_errors: true

    - name: Install Playwright Chromium browser (if not present)
      command: >
        node {{ openclaw_home }}/.local/share/pnpm/global/5/.pnpm/playwright-core@1.58.2/node_modules/playwright-core/cli.js
        install chromium
      become_user: "{{ openclaw_user }}"
      when: not playwright_chrome.stat.exists

    - name: Fix browser executablePath in openclaw.json (replace old /home/node path)
      replace:
        path: "{{ openclaw_home }}/.openclaw/openclaw.json"
        regexp: '"/home/node/\.cache/ms-playwright'
        replace: '"{{ openclaw_home }}/.cache/ms-playwright'
      ignore_errors: true

    - name: Fix .cache ownership after Playwright install
      file:
        path: "{{ openclaw_home }}/.cache"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        recurse: true

    - name: Show restore complete message
      debug:
        msg: |
          Backup restored successfully!
          - Restored from: {{ backup_path }}
          - Restored to:   {{ openclaw_home }}/.openclaw/
          - Pre-restore safety backup: {{ pre_restore_backup }}
          - Service status: {{ service_status.stdout | default('unknown') }}
