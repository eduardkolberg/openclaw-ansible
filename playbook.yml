---
- name: Install OpenClaw with Docker and UFW firewall
  hosts: localhost
  connection: local
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3

  environment:
    TERM: xterm-256color
    COLORTERM: truecolor

  pre_tasks:
    - name: Enable color terminal for current session
      ansible.builtin.set_fact:
        ansible_env: "{{ ansible_env | combine({'TERM': 'xterm-256color', 'COLORTERM': 'truecolor'}) }}"

    - name: Detect operating system
      ansible.builtin.set_fact:
        is_linux: "{{ ansible_os_family == 'Debian' }}"
        is_debian: "{{ ansible_distribution in ['Debian', 'Ubuntu'] }}"

    - name: Fail on unsupported macOS
      ansible.builtin.fail:
        msg: >-
          macOS bare-metal support has been deprecated and disabled.
          Please use a Linux VM or container instead.
          See README.md for details.
      when: ansible_os_family == 'Darwin'

    - name: Display detected OS
      ansible.builtin.debug:
        msg: |
          Detected OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          OS Family: {{ ansible_os_family }}
          Linux (Debian/Ubuntu): {{ is_debian }}

    - name: Update apt cache and upgrade all packages (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: is_debian and not ci_test
      register: apt_upgrade_result

    - name: Display apt upgrade results
      ansible.builtin.debug:
        msg: "✅ System packages updated and upgraded"
      when: is_debian and apt_upgrade_result.changed

    - name: Install ACL for privilege escalation
      ansible.builtin.package:
        name: acl
        state: present
      when: is_linux

    - name: Check if running as root
      ansible.builtin.command: id -u
      register: user_id
      changed_when: false
      become: false

    - name: Set fact for root user
      ansible.builtin.set_fact:
        is_root: "{{ user_id.stdout == '0' }}"

    - name: Install Ansible collections
      ansible.builtin.command: ansible-galaxy collection install -r requirements.yml
      args:
        chdir: "{{ playbook_dir }}"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false

    - name: Ensure root .ssh directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: root_ssh_keys is defined and root_ssh_keys | length > 0

    - name: Configure authorized SSH keys for root
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "{{ item }}"
        exclusive: false
      loop: "{{ root_ssh_keys | default([]) }}"
      when: root_ssh_keys is defined and root_ssh_keys | length > 0

  roles:
    - openclaw

  post_tasks:
    - name: Copy ASCII art script
      ansible.builtin.template:
        src: roles/openclaw/templates/show-lobster.sh.j2
        dest: /tmp/show-lobster.sh
        mode: '0755'

    - name: Display ASCII art
      ansible.builtin.command: /tmp/show-lobster.sh
      changed_when: false

    - name: Create one-time welcome message for openclaw user
      ansible.builtin.copy:
        dest: "{{ openclaw_home }}/.openclaw-welcome"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: '0644'
        content: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║        📋 OpenClaw Setup - Next Steps                 ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "You are: $(whoami)@$(hostname)"
          echo "Home: $HOME"
          echo "OS: $(uname -s) $(uname -r)"
          echo ""
          echo "Environment is configured:"
          echo "  ✓ XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-not set}"
          echo "  ✓ DBUS_SESSION_BUS_ADDRESS: ${DBUS_SESSION_BUS_ADDRESS:-not set}"
          echo "  ✓ OpenClaw: $(openclaw --version 2>/dev/null || echo 'not found')"
          echo ""
          echo "────────────────────────────────────────────────────────"
          echo "🚀 Quick Start - Run This Command:"
          echo "────────────────────────────────────────────────────────"
          echo ""
          echo "    openclaw onboard --install-daemon"
          echo ""
          echo "This will:"
          echo "  • Guide you through the setup wizard"
          echo "  • Configure your messaging provider"
          echo "  • Install and start the daemon service"
          echo ""
          echo "────────────────────────────────────────────────────────"
          echo "📚 Alternative Manual Setup:"
          echo "────────────────────────────────────────────────────────"
          echo ""
          echo "1️⃣  Interactive onboarding (recommended):"
          echo "    openclaw onboard --install-daemon"
          echo ""
          echo "2️⃣  Manual configuration:"
          echo "    openclaw configure"
          echo "    nano ~/.openclaw/openclaw.json"
          echo ""
          echo "3️⃣  Login to messaging provider:"
          echo "    openclaw providers login"
          echo ""
          echo "4️⃣  Test the gateway:"
          echo "    openclaw gateway"
          echo ""
          echo "5️⃣  Install as daemon (if not using onboard):"
          echo "    openclaw daemon install"
          echo "    openclaw daemon start"
          echo ""
          echo "────────────────────────────────────────────────────────"
          echo "🔧 Useful Commands:"
          echo "────────────────────────────────────────────────────────"
          echo ""
          echo "  • View logs:        openclaw logs"
          echo "  • Check status:     openclaw status"
          echo "  • Stop daemon:      openclaw daemon stop"
          echo "  • Restart daemon:   openclaw daemon restart"
          echo "  • Troubleshoot:     openclaw doctor"
          echo "  • List agents:      openclaw agents list"
          echo ""
          {% if tailscale_enabled | default(false) %}echo "────────────────────────────────────────────────────────"
          echo "🌐 Connect Tailscale VPN (optional):"
          echo "────────────────────────────────────────────────────────"
          echo ""
          echo "    exit"
          echo "    sudo tailscale up"
          echo ""
          {% endif %}echo "────────────────────────────────────────────────────────"
          echo ""
          echo "Type 'exit' to return to your previous user"
          echo ""
          # Remove welcome message (suppress errors if already deleted)
          rm -f "$HOME/.openclaw-welcome" 2>/dev/null || true

    - name: Add welcome message to .bashrc
      ansible.builtin.lineinfile:
        path: "{{ openclaw_home }}/.bashrc"
        line: '[ -f ~/.openclaw-welcome ] && source ~/.openclaw-welcome'
        state: present
        insertafter: EOF

    - name: Configure exec approvals (no approval required for commands)
      ansible.builtin.shell: |
        python3 - <<'PYEOF'
        import json, os, secrets
        path = "{{ openclaw_home }}/.openclaw/exec-approvals.json"
        os.makedirs(os.path.dirname(path), exist_ok=True)
        if os.path.exists(path):
            with open(path) as f:
                cfg = json.load(f)
        else:
            cfg = {
                "version": 1,
                "socket": {
                    "path": "{{ openclaw_home }}/.openclaw/exec-approvals.sock",
                    "token": secrets.token_urlsafe(32)
                },
                "agents": {}
            }
        cfg["defaults"] = {"security": "full", "ask": "off", "askFallback": "full"}
        for agent in cfg.get("agents", {}).values():
            agent["security"] = "full"
            agent["ask"] = "off"
            agent["askFallback"] = "full"
        with open(path, "w") as f:
            json.dump(cfg, f, indent=2)
        # Also set tools.exec.security=full in openclaw.json if it exists
        oc_path = "{{ openclaw_home }}/.openclaw/openclaw.json"
        if os.path.exists(oc_path):
            with open(oc_path) as f:
                oc = json.load(f)
            oc.setdefault("tools", {}).setdefault("exec", {})["security"] = "full"
            oc["tools"]["exec"]["ask"] = "off"
            # Lock down Telegram group access (DMs-only, allowlist policy)
            tg = oc.get("channels", {}).get("telegram", {})
            if tg:
                tg["groupPolicy"] = "allowlist"
                tg["groups"] = {}
            # WhatsApp read-only (no sending, no broadcasts)
            wa = oc.get("channels", {}).get("whatsapp", {})
            if wa:
                wa.setdefault("actions", {}).update({"send": False, "broadcast": False})
            # OpenRouter provider (MiniMax M2.5 as default model)
            OR_KEY = "{{ openrouter_api_key }}"
            oc.setdefault("auth", {}).setdefault("profiles", {})["openrouter:manual"] = {
                "provider": "openrouter", "mode": "token"
            }
            oc.setdefault("models", {}).setdefault("providers", {})["openrouter"] = {
                "baseUrl": "https://openrouter.ai/api/v1",
                "apiKey": OR_KEY,
                "api": "openai-responses",
                "models": [{
                    "id": "minimax/minimax-m2.5",
                    "name": "MiniMax M2.5",
                    "api": "openai-responses",
                    "input": ["text"],
                    "contextWindow": 200000,
                    "maxTokens": 40960
                }]
            }
            oc.setdefault("agents", {}).setdefault("defaults", {})["model"] = {
                "primary": "openrouter/minimax/minimax-m2.5",
                "fallbacks": ["openai-codex/gpt-5.3-codex", "anthropic/claude-opus-4-6"]
            }
            with open(oc_path, "w") as f:
                json.dump(oc, f, indent=2)
        PYEOF
      become: true
      become_user: "{{ openclaw_user }}"
      changed_when: true

    - name: Patch agent auth with OpenRouter key (if agent dir exists)
      ansible.builtin.shell: |
        python3 - <<'PYEOF'
        import json, os, time
        OR_KEY = "{{ openrouter_api_key }}"
        agent_dir = "{{ openclaw_home }}/.openclaw/agents/main/agent"
        # auth-profiles.json
        ap_path = os.path.join(agent_dir, "auth-profiles.json")
        if os.path.exists(ap_path):
            with open(ap_path) as f:
                ap = json.load(f)
            ap.setdefault("profiles", {})["openrouter:manual"] = {
                "type": "token", "provider": "openrouter", "token": OR_KEY,
                "expires": int(time.time() * 1000) + 365 * 24 * 3600 * 1000
            }
            with open(ap_path, "w") as f:
                json.dump(ap, f, indent=2)
        # auth.json
        a_path = os.path.join(agent_dir, "auth.json")
        if os.path.exists(a_path):
            with open(a_path) as f:
                a = json.load(f)
            a["openrouter"] = {"type": "api_key", "key": OR_KEY}
            with open(a_path, "w") as f:
                json.dump(a, f, indent=2)
        PYEOF
      become: true
      become_user: "{{ openclaw_user }}"
      changed_when: true

    - name: Notify that playbook is complete
      ansible.builtin.debug:
        msg: "✅ OpenClaw installation complete!"
